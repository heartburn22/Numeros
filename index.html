<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Números en Español</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 20px; background: #f8f9fa; margin: 0; }
    .container { max-width: 420px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { margin: 0 0 20px; color: #1a73e8; }
    .number { font-size: 2.5em; font-weight: bold; margin: 20px 0; min-height: 60px; }
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
    button { padding: 15px; font-size: 1.3em; border: none; border-radius: 12px; background: #f1f3f4; }
    button:active { background: #e8eaed; }
    .big-btn { padding: 15px 30px; font-size: 1.2em; margin: 10px; border-radius: 12px; }
    .correct { background: #34a853 !important; color: white; }
    .wrong { background: #ea4335 !important; color: white; }
    input { font-size: 1.8em; width: 100%; text-align: center; padding: 15px; border: 2px solid #dadce0; border-radius: 12px; margin: 15px 0; }
    .controls { margin: 15px 0; }
    select, input[type=number] { padding: 10px; font-size: 1em; margin: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎧 Números en Español</h1>
    
    <div class="controls">
      <label>Rango: </label>
      <input type="number" id="min" value="0" style="width:80px"> -
      <input type="number" id="max" value="100" style="width:80px">
      <br><br>
      <select id="voiceSelect"></select>
      <button onclick="newNumber()">Nuevo Número</button>
    </div>

    <div class="number" id="display">—</div>
    
    <input type="tel" id="input" placeholder="Escribe el número" autocomplete="off" onkeypress="if(event.key==='Enter') checkAnswer()">
    
    <div class="keypad">
      <button onclick="appendDigit(1)">1</button>
      <button onclick="appendDigit(2)">2</button>
      <button onclick="appendDigit(3)">3</button>
      <button onclick="appendDigit(4)">4</button>
      <button onclick="appendDigit(5)">5</button>
      <button onclick="appendDigit(6)">6</button>
      <button onclick="appendDigit(7)">7</button>
      <button onclick="appendDigit(8)">8</button>
      <button onclick="appendDigit(9)">9</button>
      <button onclick="appendDigit(0)">0</button>
      <button onclick="clearInput()">⌫</button>
      <button onclick="checkAnswer()" style="background:#34a853;color:white">✓</button>
    </div>

    <div>
      <button class="big-btn" onclick="speakCurrent()">🔊 Repetir</button>
      <button class="big-btn" onclick="giveUp()">Mostrar y Siguiente</button>
    </div>

    <p>Correctos: <strong id="score">0</strong> | Racha: <strong id="streak">0</strong></p>
  </div>

  <script>
    // Simple Spanish number to words (0 - 999,999)
    function numeroALetras(num) {
      const unidades = ["", "uno", "dos", "tres", "cuatro", "cinco", "seis", "siete", "ocho", "nueve"];
      const teens = ["diez", "once", "doce", "trece", "catorce", "quince", "dieciséis", "diecisiete", "dieciocho", "diecinueve"];
      const decenas = ["", "", "veinte", "treinta", "cuarenta", "cincuenta", "sesenta", "setenta", "ochenta", "noventa"];
      const centenas = ["", "ciento", "doscientos", "trescientos", "cuatrocientos", "quinientos", "seiscientos", "setecientos", "ochocientos", "novecientos"];

      if (num === 0) return "cero";
      if (num === 100) return "cien";

      let str = "";

      if (num >= 100000) {
        const miles = Math.floor(num / 100000);
        str += (miles === 1 ? "cien" : centenas[miles]) + " mil ";
        num %= 100000;
      } else if (num >= 1000) {
        const miles = Math.floor(num / 1000);
        if (miles === 1) str += "mil ";
        else str += numeroALetras(miles) + " mil ";
        num %= 1000;
      }

      if (num >= 100) {
        const c = Math.floor(num / 100);
        str += centenas[c] + " ";
        num %= 100;
      }

      if (num >= 20) {
        const d = Math.floor(num / 10);
        str += decenas[d] + (num % 10 !== 0 ? " y " : " ");
        num %= 10;
      } else if (num >= 10) {
        str += teens[num - 10] + " ";
        return str.trim();
      }

      if (num > 0) str += unidades[num];

      return str.trim().replace("veinte y", "veinti");
    }

    let currentNumber = 0;
    let score = 0;
    let streak = 0;
    let currentUtterance = null;
    let voices = [];

    function loadVoices() {
      voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('es'));
      const select = document.getElementById('voiceSelect');
      select.innerHTML = '';
      voices.forEach((voice, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${voice.name} (${voice.lang})`;
        if (voice.lang.includes('MX') || voice.lang.includes('CO') || voice.lang.includes('419')) opt.selected = true;
        select.appendChild(opt);
      });
      if (voices.length === 0) {
        select.innerHTML = '<option>Sistema de voz en español</option>';
      }
    }

    speechSynthesis.onvoiceschanged = loadVoices;
    window.onload = () => {
      loadVoices();
      newNumber();
    };

    function speak(text) {
      if (currentUtterance) speechSynthesis.cancel();
      currentUtterance = new SpeechSynthesisUtterance(text);
      const select = document.getElementById('voiceSelect');
      if (voices.length > 0 && select.value !== '') {
        currentUtterance.voice = voices[parseInt(select.value)];
      }
      currentUtterance.lang = 'es-MX'; // fallback
      currentUtterance.rate = 0.9;
      speechSynthesis.speak(currentUtterance);
    }

    function newNumber() {
      const min = parseInt(document.getElementById('min').value) || 0;
      const max = parseInt(document.getElementById('max').value) || 100;
      currentNumber = Math.floor(Math.random() * (max - min + 1)) + min;
      document.getElementById('display').textContent = 'Escuchando...';
      document.getElementById('input').value = '';
      speak(numeroALetras(currentNumber));
    }

    function speakCurrent() {
      if (currentNumber !== undefined) speak(numeroALetras(currentNumber));
    }

    function appendDigit(d) {
      const input = document.getElementById('input');
      input.value += d;
    }

    function clearInput() {
      document.getElementById('input').value = '';
    }

    function checkAnswer() {
      const input = parseInt(document.getElementById('input').value);
      if (isNaN(input)) return;

      if (input === currentNumber) {
        score++;
        streak++;
        document.getElementById('display').innerHTML = `<span style="color:#34a853">${currentNumber}</span>`;
        document.getElementById('score').textContent = score;
        document.getElementById('streak').textContent = streak;
        setTimeout(newNumber, 800);
      } else {
        streak = 0;
        document.getElementById('streak').textContent = streak;
        document.getElementById('display').classList.add('wrong');
        setTimeout(() => document.getElementById('display').classList.remove('wrong'), 600);
      }
    }

    function giveUp() {
      document.getElementById('display').innerHTML = `<span style="color:#ea4335">${currentNumber}</span>`;
      streak = 0;
      document.getElementById('streak').textContent = streak;
      setTimeout(newNumber, 1200);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Números en Español</title>
  <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 15px; background: #f8f9fa; margin: 0; }
    .container { max-width: 420px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    input { font-size: 2em; width: 100%; text-align: center; padding: 18px; border: 2px solid #dadce0; border-radius: 12px; margin: 20px 0; box-sizing: border-box; }
    button { padding: 15px 24px; font-size: 1.15em; margin: 8px; border: none; border-radius: 12px; background: #f1f3f4; }
    .big-btn { padding: 16px 28px; font-size: 1.25em; flex: 1; }
    .buttons { display: flex; gap: 12px; margin: 15px 0; }
    select { padding: 12px; font-size: 1.05em; margin: 8px 0; width: 100%; border-radius: 8px; }
    .history { margin-top: 30px; text-align: left; max-height: 240px; overflow-y: auto; background: #f8f9fa; padding: 12px; border-radius: 10px; }
    .history-item { padding: 6px 0; border-bottom: 1px solid #eee; font-size: 1.15em; }
    .attribution { margin-top: 20px; font-size: 0.8em; color: #666; }
    .speed-control { margin: 8px 0 15px 0; }
    .speed-label { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.05em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls">
      <select id="rangeSelect">
        <option value="0-10">0 - 10</option>
        <option value="0-100" selected>0 - 100</option>
        <option value="0-1000">0 - 1,000</option>
        <option value="0-10000">0 - 10,000</option>
        <option value="10000-1000000">10,000 - 1,000,000</option>
        <option value="10000-10000000">10,000 - 10,000,000</option>
        <option value="10000-1000000000">10,000 - 1,000,000,000</option>
        <option value="custom">Rango Personalizado</option>
      </select>

      <div id="customRange" style="display:none; margin:8px 0;">
        <input type="number" id="min" value="0" style="width:48%"> -
        <input type="number" id="max" value="100" style="width:48%">
      </div>

      <select id="voiceSelect">
        <option value="random" selected>🎲 Voz aleatoria cada vez</option>
        <option value="Spanish Female">🇲🇽 Spanish Female</option>
        <option value="Spanish Male">🇲🇽 Spanish Male</option>
      </select>

      <div class="speed-control">
        <div class="speed-label">
          Velocidad: <span id="speedValue">1.0x</span>
        </div>
        <input type="range" id="speed" min="0.6" max="1.4" step="0.05" value="1.0" style="width:100%;">
      </div>
    </div>

    <input type="tel" id="input" autocomplete="off" onkeypress="if(event.key==='Enter') checkAnswer()">

    <div class="buttons">
      <button class="big-btn" onclick="speakCurrent()">Repetir</button>
      <button class="big-btn" onclick="giveUp()">Mostrar</button>
    </div>

    <p>Correctos: <strong id="score">0</strong> | Racha: <strong id="streak">0</strong></p>

    <div class="history">
      <strong>Historial:</strong>
      <div id="historyList"></div>
    </div>

    <div class="attribution">
      Powered by <a href="https://responsivevoice.org/" target="_blank">ResponsiveVoice</a> (Non-Commercial)
    </div>
  </div>

  <script>
    let currentNumber = 0;
    let score = 0;
    let streak = 0;

    function numeroALetras(num) {
      if (num === 0) return "cero";
      if (num === 100) return "cien";

      const unidades = ["", "uno", "dos", "tres", "cuatro", "cinco", "seis", "siete", "ocho", "nueve"];
      const teens = ["diez", "once", "doce", "trece", "catorce", "quince", "dieciséis", "diecisiete", "dieciocho", "diecinueve"];
      const decenas = ["", "", "veinte", "treinta", "cuarenta", "cincuenta", "sesenta", "setenta", "ochenta", "noventa"];
      const centenas = ["", "ciento", "doscientos", "trescientos", "cuatrocientos", "quinientos", "seiscientos", "setecientos", "ochocientos", "novecientos"];

      let str = "";

      if (num >= 1000000) {
        const millones = Math.floor(num / 1000000);
        str += (millones === 1 ? "un millón" : numeroALetras(millones) + " millones ") + " ";
        num %= 1000000;
      }
      if (num >= 1000) {
        const miles = Math.floor(num / 1000);
        if (miles === 1) str += "mil ";
        else str += numeroALetras(miles) + " mil ";
        num %= 1000;
      }
      if (num >= 100) {
        const c = Math.floor(num / 100);
        str += centenas[c] + " ";
        num %= 100;
      }
      if (num >= 20) {
        const d = Math.floor(num / 10);
        str += decenas[d];
        if (num % 10 !== 0) str += " y ";
        num %= 10;
      } else if (num >= 10) {
        str += teens[num - 10] + " ";
        return str.trim();
      }
      if (num > 0) str += unidades[num];
      return str.trim().replace("veinte y", "veinti");
    }

    function speak(text) {
      if (typeof responsiveVoice === "undefined") {
        alert("ResponsiveVoice no se cargó. Verifica tu conexión.");
        return;
      }

      const voiceSelect = document.getElementById('voiceSelect').value;
      let voice = "Spanish Female";
      if (voiceSelect === "random") {
        voice = Math.random() > 0.5 ? "Spanish Female" : "Spanish Male";
      } else if (voiceSelect) {
        voice = voiceSelect;
      }

      const rate = parseFloat(document.getElementById('speed').value);

      responsiveVoice.speak(text, voice, { rate: rate, pitch: 1.0 });
    }

    function newNumber() {
      let min = 0, max = 100;
      const rangeVal = document.getElementById('rangeSelect').value;

      if (rangeVal === 'custom') {
        min = parseInt(document.getElementById('min').value) || 0;
        max = parseInt(document.getElementById('max').value) || 100;
      } else {
        const [a, b] = rangeVal.split('-').map(Number);
        min = a; max = b;
      }

      currentNumber = Math.floor(Math.random() * (max - min + 1)) + min;
      
      resetInput();
      speak(numeroALetras(currentNumber));
      setTimeout(() => document.getElementById('input').focus(), 500);
    }

    function resetInput() {
      const input = document.getElementById('input');
      input.value = '';
      input.style.color = '';
    }

    function speakCurrent() {
      resetInput();
      speak(numeroALetras(currentNumber));
      setTimeout(() => document.getElementById('input').focus(), 300);
    }

    function checkAnswer() {
      const inputEl = document.getElementById('input');
      const input = parseInt(inputEl.value);
      if (isNaN(input)) return;

      if (input === currentNumber) {
        score++;
        streak++;
        showResult(currentNumber, true);
        document.getElementById('score').textContent = score;
        document.getElementById('streak').textContent = streak;
        setTimeout(newNumber, 800);
      } else {
        streak = 0;
        document.getElementById('streak').textContent = streak;
        inputEl.style.color = '#ea4335';   // stays red until next number
      }
    }

    function giveUp() {
      showResult(currentNumber, false);
      streak = 0;
      document.getElementById('streak').textContent = streak;
      setTimeout(newNumber, 1200);
    }

    function showResult(num, isCorrect) {
      const color = isCorrect ? '#34a853' : '#ea4335';
      const list = document.getElementById('historyList');
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `<span style="color:${color}">${num}</span>`;
      list.appendChild(item);
      list.scrollTop = list.scrollHeight;
    }

    // Event listeners
    document.getElementById('rangeSelect').addEventListener('change', () => {
      document.getElementById('customRange').style.display = document.getElementById('rangeSelect').value === 'custom' ? 'block' : 'none';
      newNumber();
    });

    document.getElementById('voiceSelect').addEventListener('change', newNumber);
    document.getElementById('min').addEventListener('change', newNumber);
    document.getElementById('max').addEventListener('change', newNumber);

    document.getElementById('speed').addEventListener('input', function() {
      document.getElementById('speedValue').textContent = this.value + 'x';
    });

    // Clear red color when user starts typing
    document.getElementById('input').addEventListener('input', function() {
      if (this.style.color === 'rgb(234, 67, 53)') {
        this.style.color = '';
      }
    });

    window.onload = () => {
      setTimeout(newNumber, 800);
    };
  </script>
</body>
</html>

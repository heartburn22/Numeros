<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Números en Español - RHVoice</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 20px; background: #f8f9fa; margin: 0; }
    .container { max-width: 420px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { margin: 0 0 20px; color: #1a73e8; }
    .number { font-size: 2.5em; font-weight: bold; margin: 20px 0; min-height: 60px; }
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
    button { padding: 15px; font-size: 1.3em; border: none; border-radius: 12px; background: #f1f3f4; }
    button:active { background: #e8eaed; }
    .big-btn { padding: 15px 30px; font-size: 1.2em; margin: 10px; border-radius: 12px; }
    input { font-size: 1.8em; width: 100%; text-align: center; padding: 15px; border: 2px solid #dadce0; border-radius: 12px; margin: 15px 0; }
    select { padding: 10px; font-size: 1em; margin: 5px; width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎧 Números en Español</h1>
    
    <div>
      <button onclick="refreshVoices()">🔄 Actualizar Voces</button>
      <select id="voiceSelect"></select>
    </div>

    <div class="controls">
      Rango: <input type="number" id="min" value="0" style="width:80px"> -
      <input type="number" id="max" value="100" style="width:80px">
      <button onclick="newNumber()">Nuevo Número</button>
    </div>

    <div class="number" id="display">—</div>
    
    <input type="tel" id="input" placeholder="Escribe el número" autocomplete="off" onkeypress="if(event.key==='Enter') checkAnswer()">

    <div class="keypad">
      <!-- keypad buttons same as before -->
      <button onclick="appendDigit(1)">1</button><button onclick="appendDigit(2)">2</button><button onclick="appendDigit(3)">3</button>
      <button onclick="appendDigit(4)">4</button><button onclick="appendDigit(5)">5</button><button onclick="appendDigit(6)">6</button>
      <button onclick="appendDigit(7)">7</button><button onclick="appendDigit(8)">8</button><button onclick="appendDigit(9)">9</button>
      <button onclick="appendDigit(0)">0</button>
      <button onclick="clearInput()">⌫</button>
      <button onclick="checkAnswer()" style="background:#34a853;color:white">✓</button>
    </div>

    <div>
      <button class="big-btn" onclick="speakCurrent()">🔊 Repetir</button>
      <button class="big-btn" onclick="giveUp()">Mostrar y Siguiente</button>
    </div>

    <p>Correctos: <strong id="score">0</strong> | Racha: <strong id="streak">0</strong></p>
  </div>

  <script>
    let currentNumber = 0;
    let score = 0;
    let streak = 0;
    let voices = [];

    function numeroALetras(num) {
      // (same function as before - keeping it short here)
      if (num === 0) return "cero";
      // ... full function from previous version ...
      // For brevity I'm omitting the full converter here - use the one from my earlier message
      return num.toString(); // temporary fallback
    }

    function loadVoices() {
      voices = speechSynthesis.getVoices();
      const select = document.getElementById('voiceSelect');
      select.innerHTML = '<option value="">Automático (RHVoice)</option>';
      
      voices.forEach((voice, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${voice.name} (${voice.lang})`;
        // Prefer RHVoice or Spanish voices
        if (voice.name.toLowerCase().includes('rhvoice') || 
            voice.lang.includes('es') || 
            voice.lang.includes('MX') || voice.lang.includes('CO')) {
          opt.selected = true;
        }
        select.appendChild(opt);
      });
    }

    function refreshVoices() {
      speechSynthesis.cancel();
      loadVoices();
    }

    speechSynthesis.onvoiceschanged = loadVoices;

    window.onload = () => {
      // Force load voices
      setTimeout(() => {
        loadVoices();
        newNumber();
      }, 500);
    };

    function speak(text) {
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      
      const select = document.getElementById('voiceSelect');
      if (select.value !== '') {
        utterance.voice = voices[parseInt(select.value)];
      }
      
      // Critical: Force Spanish language
      utterance.lang = 'es-MX';   // or 'es' or 'es-CO'
      utterance.rate = 0.95;
      utterance.pitch = 1.0;
      
      speechSynthesis.speak(utterance);
    }

    function newNumber() {
      const min = parseInt(document.getElementById('min').value) || 0;
      const max = parseInt(document.getElementById('max').value) || 100;
      currentNumber = Math.floor(Math.random() * (max - min + 1)) + min;
      
      document.getElementById('display').textContent = '🎤 Escuchando...';
      document.getElementById('input').value = '';
      speak(numeroALetras(currentNumber));
    }

    // Rest of the functions (appendDigit, checkAnswer, etc.) same as previous version
    // ... copy them from the earlier full HTML ...
  </script>
</body>
</html>
